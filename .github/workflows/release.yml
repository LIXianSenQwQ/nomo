name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            rust-target: ''
            args: '--bundles nsis'
          - name: macOS arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.1 --activate

      - name: Setup Rust
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean stale Windows release outputs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @(
            'src-tauri\target\release\bundle',
            'src-tauri\target\release\nsis',
            'src-tauri\target\release\wix'
          ) | ForEach-Object {
            Remove-Item -LiteralPath $_ -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Build macOS Quick Look extension
        if: runner.os == 'macOS'
        shell: bash
        env:
          QUICKLOOK_ARCH: ${{ matrix.rust-target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}
          APPLE_CODESIGN_IDENTITY: '-'
        run: pnpm run build:quicklook-extension

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Nomo ${{ github.ref_name }}
          releaseBody: |
            Windows:
            - x64-setup.exe: 安装版
            - x64.zip: 免安装版
            - checksums.md5: MD5 校验清单

            macOS:
            - .dmg / .app.tar.gz: arm64
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $zipRoot = Join-Path $env:RUNNER_TEMP 'nomo-x64'
          $appDir = Join-Path $zipRoot 'Nomo'
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "Nomo_${version}_x64.zip"

          Remove-Item -LiteralPath $zipRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $appDir | Out-Null

          Copy-Item -LiteralPath 'src-tauri\target\release\nomo.exe' -Destination (Join-Path $appDir 'nomo.exe')
          if (Test-Path -LiteralPath 'src-tauri\target\release\resources') {
            Copy-Item -LiteralPath 'src-tauri\target\release\resources' -Destination (Join-Path $appDir 'resources') -Recurse
          }

          Compress-Archive -LiteralPath $appDir -DestinationPath $zipPath -Force
          "NOMO_ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Upload Windows zip release asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload '${{ github.ref_name }}' "$env:NOMO_ZIP_PATH" --clobber

  checksums:
    name: Publish MD5 checksums
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Generate and upload checksums.md5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download '${{ github.ref_name }}' --dir release-assets --clobber
          rm -f release-assets/checksums.md5 checksums.md5

          mapfile -d '' files < <(find release-assets -maxdepth 1 -type f ! -name 'checksums.md5' -print0 | sort -z)
          : > checksums.md5
          for file in "${files[@]}"; do
            md5="$(md5sum "$file" | awk '{print $1}')"
            name="$(basename "$file")"
            printf '%s  %s\n' "$md5" "$name" >> checksums.md5
          done

          gh release upload '${{ github.ref_name }}' checksums.md5 --clobber
